---
layout: default
---

<div class="home container-fluid">
  <div class="row">
    <section class="profile col-3">
        {% include my_profile.html %}
    </section>
    <section class="pages col-9">
      <nav>
        <a class="back" href="#" onclick="goBack()">
          <i class="material-icons back-icon">
            keyboard_backspace
          </i>
          <span class="back-text">Back to articles</span> 
        </a>
      </nav>
      <article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

        <header class="post-header"> 
          <p class="article-post-meta">
            <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
              {% assign date_format = site.minima.date_format | default: "%b %-d, %Y" %}
              {{ page.date | date: date_format }}
            </time>
            {% if page.author %}
              • <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">{{ page.author }}</span></span>
            {% endif %}
          </p>
          <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
        </header>

        <div class="post-content e-content" itemprop="articleBody">
          {{ content }}
        </div>

      <div id="disqus_thread"></div>
      <script>
        function goBack() {
          window.history.back();
        }

      /**
      *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
      *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables*/
      /*
      var disqus_config = function () {
      this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
      this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
      };
      */
      (function() { // DON'T EDIT BELOW THIS LINE
      var d = document, s = d.createElement('script');
      s.src = 'https://deeplearn.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
      })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
                                  
        <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
      </article>
    </section>
  </div>
</div>
